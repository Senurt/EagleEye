<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password | Eagle Eye</title>
    <link rel="stylesheet" href="global.css">
</head>
<body style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;">
    <div style="background: var(--card-bg); padding: 40px; border-radius: 12px; border: 1px solid var(--border); width: 400px; text-align: center;">
        <img src="image_e7a974.png" alt="Eagle Eye" style="height: 40px; margin-bottom: 20px;">
        <h2>Account Recovery</h2>
        <p style="color: var(--muted-fg); font-size: 0.85rem; margin-bottom: 20px;">Enter your username to request an unlock from the Station Administrator.</p>
        <input type="text" id="recoveryUser" class="input-field" placeholder="8-Character Username" style="margin-bottom: 20px;">
        <button onclick="submitRecovery()" class="btn-primary" style="width: 100%;">SEND REQUEST</button>
        <a href="login.html" style="display: block; margin-top: 15px; color: var(--primary); font-size: 0.85rem; text-decoration: none;">Back to Login</a>
    </div>
    <script>
        function submitRecovery() {
            const user = document.getElementById('recoveryUser').value;
            if(user) { alert(`Recovery request sent to Admin for user: ${user}`); window.location.href='login.html'; }
        }
    </script>
</body>
</html>
